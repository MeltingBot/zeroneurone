<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroNeurone</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Cognitive amplification tool for analysts and investigators - infinite whiteboard with graph analysis" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZeroNeurone" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
  </head>
  <body>
    <div id="root">
      <!-- Splash screen (HTML/CSS pur, remplacé par React au montage) -->
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f5f0e8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        gap: 12px;
      ">
        <img src="/logo.png" alt="ZeroNeurone" width="80" height="80" />
        <div style="font-size: 18px; font-weight: 600; color: #111827;">ZeroNeurone</div>
        <div style="font-size: 11px; color: #9ca3af;">v%APP_VERSION%</div>
        <div style="
          width: 20px; height: 20px;
          border: 2px solid #2563eb;
          border-top-color: transparent;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
          margin-top: 8px;
        "></div>
      </div>
      <style>
        @keyframes splash-spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
