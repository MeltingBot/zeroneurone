server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ESM modules — nginx's default mime.types doesn't map .mjs, and
    # X-Content-Type-Options: nosniff blocks the browser from guessing.
    types {
        application/javascript mjs;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Hashed assets (immutable cache) - Vite adds 8-char hashes like .a1b2c3d4.js
    location ~* "-[a-zA-Z0-9_-]+\.(js|css|woff2?)$" {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot|webm|mp4|pdf|wasm)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://tile.openstreetmap.org https://*.tile.openstreetmap.fr https://*.tile.openstreetmap.de https://*.basemaps.cartocdn.com https://server.arcgisonline.com https://s3.amazonaws.com https://tiles.openfreemap.org; connect-src 'self' https://nominatim.openstreetmap.org wss: ws:; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self';" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
